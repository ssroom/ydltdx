name: Fetch Cloudflare IPs

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch IPs
        run: |
          mkdir -p data/history
          curl -s "https://www.wetest.vip/api/cf2dns/get_cloudflare_ip?key=o1zrmHAF&type=v4" \
            -H "User-Agent: Mozilla/5.0" \
            -o data/latest.json

      - name: Process data
        run: python3 process.py

      - name: Clean old history
        run: |
          cd data/history
          ls -t | tail -n +201 | xargs -r rm --

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          COUNT=$(python3 -c "import json; print(len(json.load(open('data/latest.json'))['info']))")
          git diff --cached --quiet || git commit -m "update $(date -u +'%Y-%m-%d %H:%M') UTC - ${COUNT} IPs"
          git push
