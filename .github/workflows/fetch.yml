name: Fetch Cloudflare IPs

on:
  schedule:
    - cron: '*/15 * * * *'  # 每15分鐘執行一次
  workflow_dispatch:          # 允許手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch IPs from wetest.vip
        run: |
          mkdir -p data/history

          # 抓取最新數據
          curl -s "https://www.wetest.vip/api/cf2dns/get_cloudflare_ip?key=o1zrmHAF&type=v4" \
            -H "User-Agent: Mozilla/5.0" \
            -o data/latest.json

          # 驗證是否成功
          if ! python3 -c "import json,sys; d=json.load(open('data/latest.json')); print(f'Got {len(d[\"info\"])} IPs')" 2>/dev/null; then
            echo "Fetch failed or invalid JSON"
            cat data/latest.json
            exit 1
          fi

          # 生成帶時間戳的歷史快照
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          cp data/latest.json "data/history/${TIMESTAMP}.json"

          # 同時生成純 IP 列表（方便直接用）
          python3 - <<'EOF'
          import json, datetime

          with open('data/latest.json') as f:
              data = json.load(f)

          info = data.get('info', [])

          # 純 IP 列表
          ips = [item['ip'] for item in info if item.get('ip')]
          with open('data/ip_list.txt', 'w') as f:
              f.write('\n'.join(ips))

          # 生成 CSV（方便篩選）
          import csv
          with open('data/latest.csv', 'w', newline='') as f:
              writer = csv.DictWriter(f, fieldnames=['ip','delay','speed','loss','type','colo'])
              writer.writeheader()
              for item in info:
                  writer.writerow({
                      'ip':    item.get('ip',''),
                      'delay': item.get('delay',''),
                      'speed': item.get('speed',''),
                      'loss':  item.get('loss',''),
                      'type':  item.get('type',''),
                      'colo':  item.get('colo', item.get('region','')),
                  })

          # 更新 README
          now = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')
          delays = [float(i['delay']) for i in info if i.get('delay')]
          speeds = [float(i['speed']) for i in info if i.get('speed') and float(i.get('speed',0))>0]
          avg_delay = round(sum(delays)/len(delays), 1) if delays else 0
          avg_speed = round(sum(speeds)/len(speeds), 2) if speeds else 0

          readme = f"""# Cloudflare IP 自動抓取

          數據來源：[wetest.vip](https://www.wetest.vip/page/cloudflare/address_v4.html)  
          每 15 分鐘自動更新一次（GitHub Actions）

          ## 最新數據摘要

          | 項目 | 數值 |
          |------|------|
          | 更新時間 | {now} |
          | IP 總數 | {len(info)} |
          | 平均延遲 | {avg_delay} ms |
          | 平均速度 | {avg_speed} MB/s |

          ## 文件說明

          | 文件 | 說明 |
          |------|------|
          | `data/latest.json` | 最新完整 JSON 數據 |
          | `data/latest.csv` | 最新 CSV（可用 Excel 打開篩選）|
          | `data/ip_list.txt` | 純 IP 列表，每行一個 |
          | `data/history/` | 歷史快照（每次更新保存） |

          ## 直接獲取數據

          ```bash
          # 獲取最新 IP 列表
          curl -s https://raw.githubusercontent.com/${{GITHUB_REPOSITORY}}/main/data/ip_list.txt

          # 獲取完整 JSON
          curl -s https://raw.githubusercontent.com/${{GITHUB_REPOSITORY}}/main/data/latest.json
          ```
          """
          with open('README.md', 'w') as f:
              f.write(readme)

          print(f"Done: {len(info)} IPs, avg delay {avg_delay}ms, avg speed {avg_speed}MB/s")
          EOF

      - name: Clean old history (keep last 200 files)
        run: |
          cd data/history
          ls -t | tail -n +201 | xargs -r rm --

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "update: $(date -u +'%Y-%m-%d %H:%M') UTC · $(python3 -c "import json; print(len(json.load(open('data/latest.json'))['info']),'IPs')")"
          git push
